trigger: none

variables:
  SCENARIO_TYPE: perf-eval
  SCENARIO_NAME: k8s-gpu-cluster-crud

stages:
  - stage: azure_eastus2_node_pool_crud
    dependsOn: []
    jobs:
      - template: /jobs/competitive-test.yml
        parameters:
          cloud: azure
          regions:
            - eastus2
          topology: k8s-crud-gpu
          engine: crud
          matrix:
            node_pool_crud_standard:
              VM_SIZE: Standard_NC6_Promo
              CREATE_NODE_COUNT: 1
              SCALE_NODE_COUNT: 3
              SCALE_STEP_SIZE: 1
              POOL_NAME: testpool
              STEP_TIME_OUT: 600
              GPU_NODE_POOL: ""
              STEP_WAIT_TIME: 30
          max_parallel: 1
          credential_type: service_connection
          ssh_key_enabled: false
          timeout_in_minutes: 60
