parameters:
  - name: aks_resource_group
    type: string
  - name: aks_cluster_name
    type: string
  - name: alias
    type: string
    default: ''

steps:
  - script: |
      set -euo pipefail
      set -x

      if [ -z "${AKS_RESOURCE_GROUP}" ]; then
        echo "##vso[task.logissue type=error;] AKS_RESOURCE_GROUP is empty."
        exit 1
      fi

      if [ -z "${AKS_CLUSTER_NAME}" ]; then
        echo "##vso[task.logissue type=error;] AKS_CLUSTER_NAME is empty."
        exit 1
      fi

      mkdir -p "${HOME}/.kube"

      az aks get-credentials \
        --resource-group "${AKS_RESOURCE_GROUP}" \
        --name "${AKS_CLUSTER_NAME}" \
        --overwrite-existing \
        ${ALIAS:+--context "${ALIAS}"}

      kubectl config get-contexts
      kubectl cluster-info
    env:
      AKS_RESOURCE_GROUP: ${{ parameters.aks_resource_group }}
      AKS_CLUSTER_NAME: ${{ parameters.aks_cluster_name }}
      ALIAS: ${{ parameters.alias }}
    displayName: "Update kubeconfig (BYO AKS)"