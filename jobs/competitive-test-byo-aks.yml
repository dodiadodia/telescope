parameters:
  - name: cloud
    type: string
  - name: regions
    type: object
  - name: topology
    type: string
  - name: engine
    type: string
  - name: engine_input
    type: object
    default: {}
  - name: matrix
    type: object
    default: {}
  - name: max_parallel
    type: number
  - name: run_id
    type: string
    default: ''
  - name: timeout_in_minutes
    type: number
    default: 60
  - name: retry_attempt_count
    type: number
    default: 3
  - name: credential_type
    type: string
    default: service_connection
    values:
      - service_connection
      - variable_group
  - name: ssh_key_enabled
    type: boolean
    default: false

jobs:
  - job: ${{ parameters.cloud }}
    strategy:
      maxParallel: ${{ parameters.max_parallel }}
      matrix: ${{ parameters.matrix }}
    timeoutInMinutes: ${{ parameters.timeout_in_minutes }}
    condition: or(eq(variables['Build.Reason'], 'Manual'), and(eq(variables['Build.Reason'], 'Schedule'), eq(variables['Build.SourceBranchName'], 'main')))
    steps:
      - template: /steps/setup-tests.yml
        parameters:
          cloud: ${{ parameters.cloud }}
          region: ${{ parameters.regions[0] }}
          run_id: ${{ parameters.run_id }}
          retry_attempt_count: ${{ parameters.retry_attempt_count }}
          credential_type: ${{ parameters.credential_type }}
          ssh_key_enabled: ${{ parameters.ssh_key_enabled }}

      - template: /steps/cloud/azure/update-kubeconfig-byo.yml
        parameters:
          aks_resource_group: $(AKS_RESOURCE_GROUP)
          aks_cluster_name: $(AKS_CLUSTER_NAME)
          alias: $(AKS_CLUSTER_NAME)

      - script: |
          set -euo pipefail

          if [ -n "${BENCHMARK_NODEPOOL_NAME:-}" ] && [ -n "${BENCHMARK_NODE_COUNT:-}" ]; then
            echo "Scaling nodepool ${BENCHMARK_NODEPOOL_NAME} to ${BENCHMARK_NODE_COUNT}"
            az aks nodepool scale \
              --resource-group "$(AKS_RESOURCE_GROUP)" \
              --cluster-name "$(AKS_CLUSTER_NAME)" \
              --name "${BENCHMARK_NODEPOOL_NAME}" \
              --node-count "${BENCHMARK_NODE_COUNT}"
          else
            echo "BENCHMARK_NODEPOOL_NAME or BENCHMARK_NODE_COUNT not set, skipping nodepool scale."
          fi
        displayName: "Scale benchmark nodepool"

      - template: /steps/validate-resources.yml
        parameters:
          cloud: ${{ parameters.cloud }}
          regions: ${{ parameters.regions }}
          topology: ${{ parameters.topology }}
          engine: ${{ parameters.engine }}

      - template: /steps/execute-tests.yml
        parameters:
          cloud: ${{ parameters.cloud }}
          topology: ${{ parameters.topology }}
          engine: ${{ parameters.engine }}
          regions: ${{ parameters.regions }}
          engine_input: ${{ parameters.engine_input }}

      - template: /steps/publish-results.yml
        parameters:
          cloud: ${{ parameters.cloud }}
          topology: ${{ parameters.topology }}
          engine: ${{ parameters.engine }}
          regions: ${{ parameters.regions }}
          engine_input: ${{ parameters.engine_input }}
          credential_type: ${{ parameters.credential_type }}